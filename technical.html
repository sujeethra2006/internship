<body>
    <!DOCTYPE html>
<html>
<head>
    <title>Technical Skills</title>
    <style>
        body {
            background-color: rgb(2, 1, 36);
            color: rgb(255, 255, 255);
            font-family: Footlight MT;
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: rgb(255, 217, 0);
            font-size: 35px;
            font-family: Felix Titling;
            margin-bottom: 5px;
        }

        p {
            color: rgb(251, 237, 237);
            margin-bottom: 40px;
        }

        section {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        div {
            background-color: white;
            color: rgba(0, 0, 0, 0.597);
            width: 400px;
            padding: 20px;
            border-radius: 15px;
            text-align: left;
        }

        div h3 {
            margin-top: 0;
            font-size: 20px;
            color: black;
        }

        div span {
            background-color: #e7d3a6;
            color: #745404;
            padding: 6px 15px;
            border-radius: 20px;
            margin-right: 5px;
            margin-bottom: 8px;
            display: inline-block;
            font-size: 14px;
        }
    </style>
</head>
<body>
<h1>Technical Skills</h1>
    <p>Technologies and tools I use to design and develop modern web solutions</p>
<section>
            <div>
            <h3>Frontend</h3>
            <span>HTML</span>
            <span>CSS</span>
            <span>JavaScript</span>
            <span>React</span>
        </div>
<div>
            <h3>Backend/CMS</h3>
            <span>WordPress</span>
            <span>PHP</span>
            <span>MySQL</span>
        </div>
        <div>
            <h3>Design Tools</h3>
            <span>Adobe Photoshop</span>
            <span>Figma</span>
            <span>Canva</span>
        </div>
        <div>
            <h3>Dev Tools</h3>
            <span>Git</span>
            <span>VPS Server</span>
            <span>VS Code</span>
        </div>
 </section>
</body>
</html>
