<html>
<head>
    <title>Contact Form</title>
    <style>
        body {
            background-color: rgb(240, 235, 235);
            font-family:Sans Serif Collection ;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        form {
            background-color: white;
            width: 550px;
            padding: 35px;
            border-radius: 20px;
            text-align: center;
        }

        h3 {
            color: rgb(0, 0, 0);
            font-size: 22px;
            margin-bottom: 25px;
        }

        /* Input matrum textarea color sariyaaga maathapatulladhu */
        input, textarea {
            background-color: whitesmoke;
            border: 1px solid lightgray;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 20px;
            font-size: 15px;
            width: 100%;
            box-sizing: border-box;
        }

        section {
            display: flex;
            gap: 15px;
        }

        textarea {
            height: 120px;
            resize: none;
        }

        /* Button-ku accurate gold/mustard color name */
        button {
            background-color: rgb(173, 127, 10);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <form>
        <h3>Send me a message</h3>

        <input type="text" placeholder="Enter Your Name / Company *">

        <section>
            <input type="email" placeholder="Enter Your Email *">
            <input type="text" placeholder="Enter Phone Number *">
        </section>

        <textarea placeholder="Write Message..."></textarea>

        <button type="submit">Send Message</button>
    </form>

</body>
</html>
