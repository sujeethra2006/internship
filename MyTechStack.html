<!DOCTYPE html>

    <style>
        body {
            background: #01232c;
            font-family:Yu Gothic;
            color: rgb(255, 255, 255);
            margin: 2px;
            padding: 30px;
        }
        h1 {
            text-align: center;
            margin-bottom: 50px;
            font-family:Copperplate Gothic;
            color: #7ee1ff;
        }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            font-weight: bold;
        }
        .tab {
            padding: 12px 25px;
            background:#003a61;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        .tab.active {
            background: #0d95bf;
        }
        .container {
            display: grid;
            grid-template-columns:repeat(4,1fr);
            gap: 20px;
        }
        .card {
            background: #002949;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: 0.3s;
        }
        .card img {
            width: 100px;
            height: 70px;
            object-fit: contain;
            margin-bottom: 20px;
        }
        .card h2 {
            font-size: 25px;
            margin: 10px 0;
            color: rgb(244, 164, 14);
        }
    </style>
</head>
