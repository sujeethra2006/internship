<!DOCTYPE html>
<html>
    <head>
        <style>
            body{
                background-color: bisque;
            }
            h1{
                color:rgb(180, 18, 18);
                margin-left:40px;
                text-align: center;
            }
            p{
                font-size: 25px;
                color:rgb(220, 83, 20);
            }
        </style>
    </head>
    <body>
        <h1>Internal CSS</h1>
        <p>Internal CSS is CSS written inside the <b>style</b> tag within the <b>head</b> section of an
         HTML document.<br>
         An internal style sheet may be used if one single HTML page has a unique style.
        </p>
    </body>
</html>
