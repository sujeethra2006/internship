<style>
    .loader{
        border:5px solid lightgrey;
        border-top: 5px solid rgb(77, 77, 236);
        border-radius: 50%;
        width:40px;
        height:40px;
        animation:spin 1s linear infinite;
    }
    @keyframes spin{
        100% { transform: rotate(360deg);}
    }
</style>
<div class="loader"></div>
